# Local stack — Phase 1 scaffold
# Usage (from repo root):
#   docker compose -f BE_Bot_Auto_Trade_AI_Tu_Hoc/infra/compose/docker-compose.yml --env-file .env.example up -d
# Minimum healthy deps: postgres, redis, redpanda.
# gateway / web need their Dockerfiles (skeleton below).

name: trade-ai

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-trade}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trade} -d ${POSTGRES_DB:-trade}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 10s
      retries: 12

  # Build context: BE_Bot_Auto_Trade_AI_Tu_Hoc/services/gateway
  gateway:
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://trade:changeme_dev_only@postgres:5432/trade}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      APP_ENV: ${APP_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  web:
    build:
      context: ../../../FE_Bot_Auto_Trade_AI_Tu_Hoc/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    depends_on:
      - gateway

volumes:
  postgres_data:
