openapi: 3.0.3
info:
  title: Trade AI Gateway API
  version: 0.0.0
  description: Stub OpenAPI — expand per docs/shared/api-overview.md
servers:
  - url: http://localhost:8000
    description: local gateway
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [status]
  /ready:
    get:
      operationId: getReady
      summary: Readiness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [status]
components:
  schemas:
    Error:
      type: object
      required: [code, message, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
          format: uuid
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
