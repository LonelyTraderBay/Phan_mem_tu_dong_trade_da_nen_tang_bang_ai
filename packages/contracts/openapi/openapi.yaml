openapi: 3.0.3
info:
  title: Trade AI Gateway API
  version: "0.3.0"
  description: >-
    Contract stubs for Phase-1 MVP; BE may return 501 until implement;
    x-mvp true = In-MVP; FE must not invent fields.

servers:
  - url: http://localhost:8000
    description: Local gateway

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Accounts
  - name: Strategies
  - name: Market
  - name: Portfolio
  - name: Reports
  - name: KillSwitch
  - name: Alerts
  - name: Models
  - name: WebSocket
  - name: System

paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service liveness
      tags: [System]
      x-mvp: true
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /ready:
    get:
      operationId: getReady
      summary: Check service readiness
      tags: [System]
      x-mvp: true
      security: []
      responses:
        "200":
          description: Service readiness status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/login:
    post:
      operationId: postAuthLogin
      summary: Authenticate a user
      tags: [Auth]
      x-mvp: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/refresh:
    post:
      operationId: postAuthRefresh
      summary: Refresh an access token
      tags: [Auth]
      x-mvp: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/logout:
    post:
      operationId: postAuthLogout
      summary: Revoke the current session
      tags: [Auth]
      x-mvp: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/accounts:
    post:
      operationId: postAccounts
      summary: Create a trading account
      tags: [Accounts]
      x-mvp: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreate"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/accounts/{account_id}/api-keys:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      operationId: postAccountApiKeys
      summary: Register exchange API credentials
      tags: [Accounts]
      x-mvp: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyCreate"
      responses:
        "201":
          description: API credentials registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyMasked"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/strategies:
    get:
      operationId: getStrategies
      summary: List strategies
      tags: [Strategies]
      x-mvp: true
      parameters:
        - $ref: "#/components/parameters/AccountIdQuery"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StrategyStatus"
      responses:
        "200":
          description: Strategies returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      operationId: postStrategies
      summary: Create a strategy
      tags: [Strategies]
      x-mvp: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyCreate"
      responses:
        "201":
          description: Strategy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/strategies/{strategy_id}:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
    patch:
      operationId: patchStrategy
      summary: Update a strategy
      tags: [Strategies]
      x-mvp: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyPatch"
      responses:
        "200":
          description: Strategy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/market/symbols:
    get:
      operationId: getMarketSymbols
      summary: List available market symbols
      tags: [Market]
      x-mvp: true
      parameters:
        - name: exchange
          in: query
          required: false
          schema:
            type: string
        - name: market_type
          in: query
          required: false
          schema:
            type: string
            enum: [spot, futures]
      responses:
        "200":
          description: Market symbols returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketSymbol"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/market/candles:
    get:
      operationId: getMarketCandles
      summary: Get OHLCV candles
      tags: [Market]
      x-mvp: true
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d]
        - name: start_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 500
      responses:
        "200":
          description: Candles returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/positions:
    get:
      operationId: getPositions
      summary: List account positions
      tags: [Portfolio]
      x-mvp: true
      parameters:
        - $ref: "#/components/parameters/AccountIdQuery"
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: open_only
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Positions returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/pnl/summary:
    get:
      operationId: getPnlSummary
      summary: Get server-calculated PnL summary
      tags: [Portfolio]
      x-mvp: true
      parameters:
        - $ref: "#/components/parameters/AccountIdQuery"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: PnL summary returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnlSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/reports/trades:
    get:
      operationId: getReportsTrades
      summary: Get trade report entries
      tags: [Reports]
      x-mvp: true
      parameters:
        - $ref: "#/components/parameters/AccountIdQuery"
        - name: strategy_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Trade report entries returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/ws/ticket:
    post:
      operationId: postWsTicket
      summary: Issue a short-lived Gateway WebSocket ticket
      description: >
        Authenticated operator obtains a ticket to connect to Gateway WS at
        `ws_path` (default `/ws`) with query `ticket`. See packages/contracts/ws/
        and RFC-0003. FE must not connect to the Event Bus.
      tags: [WebSocket]
      x-mvp: true
      responses:
        "200":
          description: Ticket issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WsTicketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/kill-switch:
    get:
      operationId: getKillSwitchStatus
      summary: Get kill-switch status
      tags: [KillSwitch]
      x-mvp: true
      responses:
        "200":
          description: Kill-switch status returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KillSwitchStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      operationId: postKillSwitch
      summary: Change kill-switch state
      tags: [KillSwitch]
      x-mvp: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KillSwitchRequest"
      responses:
        "200":
          description: Kill-switch state changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KillSwitchStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/alerts:
    get:
      operationId: getAlerts
      summary: List alerts
      tags: [Alerts]
      x-mvp: true
      parameters:
        - $ref: "#/components/parameters/AccountIdQuery"
        - name: acknowledged
          in: query
          required: false
          schema:
            type: boolean
        - name: severity
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AlertSeverity"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Alerts returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /v1/models/{model_id}/promote:
    parameters:
      - $ref: "#/components/parameters/ModelId"
    post:
      operationId: postModelPromote
      summary: Promote a model version
      description: Deferred governance stub for Phase 3.
      tags: [Models]
      x-mvp: false
      x-phase: phase-3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelPromoteRequest"
      responses:
        "200":
          description: Model promoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPromotion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
        default:
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AccountId:
      name: account_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountIdQuery:
      name: account_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    StrategyId:
      name: strategy_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication is required or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: The caller is not permitted to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotImplemented:
      description: Contract stub is not implemented by the backend
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ErrorResponse:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [code, message, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
          format: uuid
        details:
          type: array
          items:
            type: object
            required: [field, reason]
            properties:
              field:
                type: string
              reason:
                type: string

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
        checked_at:
          type: string
          format: date-time

    ActionResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          writeOnly: true
          minLength: 8

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          writeOnly: true
          minLength: 1

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          writeOnly: true
          minLength: 1

    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          writeOnly: true
        refresh_token:
          type: string
          writeOnly: true
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          minimum: 1
          description: Access-token lifetime in seconds.

    AccountCreate:
      type: object
      required: [name, exchange, market_type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        exchange:
          type: string
          minLength: 1
        market_type:
          type: string
          enum: [spot, futures]
        testnet:
          type: boolean
          default: true

    Account:
      type: object
      required:
        [id, name, exchange, market_type, testnet, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        exchange:
          type: string
        market_type:
          type: string
          enum: [spot, futures]
        testnet:
          type: boolean
        status:
          type: string
          enum: [active, disabled, error]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ApiKeyCreate:
      type: object
      required: [label, api_key, api_secret]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 100
        api_key:
          type: string
          writeOnly: true
          minLength: 1
        api_secret:
          type: string
          writeOnly: true
          minLength: 1
        passphrase:
          type: string
          writeOnly: true
          minLength: 1

    ApiKeyMasked:
      type: object
      required: [id, account_id, label, masked_api_key, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        label:
          type: string
        masked_api_key:
          type: string
          example: "****MASKED"
        created_at:
          type: string
          format: date-time
        last_validated_at:
          type: string
          format: date-time
          nullable: true

    StrategyStatus:
      type: string
      enum: [draft, active, paused, stopped]

    StrategyCreate:
      type: object
      required: [account_id, name, symbol, timeframe]
      properties:
        account_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 120
        symbol:
          type: string
          minLength: 1
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d]
        status:
          $ref: "#/components/schemas/StrategyStatus"
        max_position_size:
          type: number
          format: double
          minimum: 0
        stop_loss_percent:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
          maximum: 100

    StrategyPatch:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        status:
          $ref: "#/components/schemas/StrategyStatus"
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d]
        max_position_size:
          type: number
          format: double
          minimum: 0
        stop_loss_percent:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
          maximum: 100

    Strategy:
      type: object
      required:
        [id, account_id, name, symbol, timeframe, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        name:
          type: string
        symbol:
          type: string
        timeframe:
          type: string
        status:
          $ref: "#/components/schemas/StrategyStatus"
        max_position_size:
          type: number
          format: double
        stop_loss_percent:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MarketSymbol:
      type: object
      required:
        [symbol, base_asset, quote_asset, exchange, market_type, active]
      properties:
        symbol:
          type: string
        base_asset:
          type: string
        quote_asset:
          type: string
        exchange:
          type: string
        market_type:
          type: string
          enum: [spot, futures]
        active:
          type: boolean
        price_precision:
          type: integer
          minimum: 0
        quantity_precision:
          type: integer
          minimum: 0

    Candle:
      type: object
      required: [symbol, interval, open_time, open, high, low, close, volume]
      properties:
        symbol:
          type: string
        interval:
          type: string
        open_time:
          type: string
          format: date-time
        close_time:
          type: string
          format: date-time
        open:
          type: number
          format: double
        high:
          type: number
          format: double
        low:
          type: number
          format: double
        close:
          type: number
          format: double
        volume:
          type: number
          format: double
          minimum: 0

    Position:
      type: object
      required:
        [id, account_id, symbol, side, quantity, entry_price, opened_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        strategy_id:
          type: string
          format: uuid
          nullable: true
        symbol:
          type: string
        side:
          type: string
          enum: [long, short]
        quantity:
          type: number
          format: double
          minimum: 0
        entry_price:
          type: number
          format: double
          minimum: 0
        mark_price:
          type: number
          format: double
          minimum: 0
        unrealized_pnl:
          type: number
          format: double
        leverage:
          type: number
          format: double
          minimum: 1
        opened_at:
          type: string
          format: date-time

    PnlSummary:
      type: object
      required:
        [account_id, currency, realized_pnl, unrealized_pnl, total_pnl, calculated_at]
      properties:
        account_id:
          type: string
          format: uuid
        currency:
          type: string
        realized_pnl:
          type: number
          format: double
        unrealized_pnl:
          type: number
          format: double
        total_pnl:
          type: number
          format: double
        gross_profit:
          type: number
          format: double
        gross_loss:
          type: number
          format: double
        trade_count:
          type: integer
          minimum: 0
        calculated_at:
          type: string
          format: date-time

    TradeReport:
      type: object
      required:
        [trade_id, account_id, symbol, side, quantity, price, executed_at]
      properties:
        trade_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        strategy_id:
          type: string
          format: uuid
          nullable: true
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        quantity:
          type: number
          format: double
          minimum: 0
        price:
          type: number
          format: double
          minimum: 0
        fee:
          type: number
          format: double
          minimum: 0
        fee_currency:
          type: string
        realized_pnl:
          type: number
          format: double
        executed_at:
          type: string
          format: date-time

    KillSwitchLevel:
      type: string
      description: Protective escalation level (paper/staging). L1 blocks new entries.
      enum: [L1, L2, L3, L4]

    KillSwitchRequest:
      type: object
      required: [engaged, reason]
      properties:
        engaged:
          type: boolean
        reason:
          type: string
          minLength: 1
          maxLength: 500
        level:
          allOf:
            - $ref: "#/components/schemas/KillSwitchLevel"
          description: >
            Target level when engaging. Defaults to L1 when omitted for backward
            compatibility. Ignored when engaged=false (full clear).
        confirmed:
          type: boolean
          description: >
            Required true for L2+ engage/disengage. L1 may omit.
            Rejected by Gateway when missing for L2+.

    KillSwitchStatus:
      type: object
      required: [engaged, updated_at]
      properties:
        engaged:
          type: boolean
        level:
          allOf:
            - $ref: "#/components/schemas/KillSwitchLevel"
          nullable: true
          description: Highest active level when engaged; null when not engaged.
        reason:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          format: uuid
          nullable: true
        trace_id:
          type: string
          nullable: true
          description: Correlation id for last mutate (no secrets).

    WsTicketResponse:
      type: object
      required: [ticket, expires_at, ws_path]
      properties:
        ticket:
          type: string
          minLength: 16
          description: Opaque short-lived ticket for Gateway WS connect
        expires_at:
          type: string
          format: date-time
        ws_path:
          type: string
          description: Gateway WS path (e.g. /ws); connect with ?ticket=
          example: /ws

    AlertSeverity:
      type: string
      enum: [info, warning, critical]

    Alert:
      type: object
      required:
        [id, severity, code, message, acknowledged, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
          nullable: true
        severity:
          $ref: "#/components/schemas/AlertSeverity"
        code:
          type: string
        message:
          type: string
        acknowledged:
          type: boolean
        created_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
          nullable: true

    ModelPromoteRequest:
      type: object
      required: [target_stage, reason]
      properties:
        target_stage:
          type: string
          enum: [staging, production]
        reason:
          type: string
          minLength: 1
          maxLength: 500

    ModelPromotion:
      type: object
      required: [model_id, target_stage, status, promoted_at]
      properties:
        model_id:
          type: string
          format: uuid
        target_stage:
          type: string
          enum: [staging, production]
        status:
          type: string
          enum: [promoted, rejected]
        promoted_at:
          type: string
          format: date-time
